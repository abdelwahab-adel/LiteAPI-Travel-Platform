<!DOCTYPE html>
<html lang="ar" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تتبع الحجوزات | LITE TRAVEL</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+Arabic:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="responsive.css" />
</head>
<body class="bg-slate-950 text-slate-150 page-fade-in py-10 px-4" dir="rtl">

  <div class="max-w-3xl mx-auto space-y-7">
    
    <!-- Top Back Navigation Bar -->
    <div class="flex justify-between items-center bg-[#0b0f19] border border-amber-500/10 p-4.5 rounded-2xl">
      <div class="flex items-center gap-2">
        <i class="fas fa-arrow-right text-amber-500"></i>
        <a href="index.html" class="text-xs font-black text-slate-300 hover:text-white transition-colors">العودة لمستكشف الفنادق الرئيسي</a>
      </div>
      <span class="text-[9px] font-mono text-slate-500">لوحة العضوية الآمنة</span>
    </div>

    <!-- Active bookings container block -->
    <div class="glass-panel p-6 sm:p-8 rounded-3xl space-y-6">
      
      <div class="border-b border-slate-850 pb-4 flex justify-between items-center">
        <div>
          <span class="text-amber-500 text-[10px] font-mono tracking-widest block uppercase">مركز التذاكر</span>
          <h2 class="font-sans font-black text-lg text-white mt-1">كشف رحلاتك وحجوزاتك المؤكدة</h2>
        </div>
        <i class="fas fa-file-invoice-dollar text-slate-500"></i>
      </div>

      <!-- list wrapper box dynamic -->
      <div id="standalone-bookings-view" class="space-y-4">
        <!-- Dyn pop -->
      </div>

    </div>

  </div>

  <script src="hotels.js"></script>
  <script src="booking.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderStandaloneBookings();

      function renderStandaloneBookings() {
        const container = document.getElementById('standalone-bookings-view');
        if (!container) return;

        const bookings = window.bookingModule.getAllBookings();

        if (bookings.length === 0) {
          container.innerHTML = `
            <div class="text-center py-16 space-y-4">
              <i class="far fa-calendar-times text-slate-600 text-4xl block"></i>
              <h4 class="font-bold text-base text-white">لم نحثر على حجوزات مسجلة ببطاقتك الحالية</h4>
              <p class="text-xs text-slate-400">عش مغامرة الترحال الفخم الآن، وعد لتتبع عقد إيجار الغرف في هذا المستودع الآمن.</p>
              <a href="index.html" class="inline-block gold-gradient-bg text-slate-950 font-black text-xs px-5 py-2.5 rounded-xl">استعراض الصادر والتوفر</a>
            </div>
          `;
          return;
        }

        container.innerHTML = bookings.map(b => {
          const isConfirmed = b.status === 'confirmed';
          const badgeClass = isConfirmed ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20';
          const badgeText = isConfirmed ? 'مؤكد ونشط بالصناعة' : 'ملغي ومسترد بالكامل';

          return `
            <div class="border border-slate-850 bg-slate-900/10 p-5 rounded-2xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <div class="flex items-start gap-3.5">
                <img src="${b.hotelImage}" alt="${b.hotelName}" class="w-12 h-12 rounded-xl object-cover shrink-0 border border-slate-800" />
                <div>
                  <div class="flex items-center gap-2 mb-1 flex-wrap">
                    <span class="text-[9.5px] font-mono tracking-wider text-amber-400 font-bold bg-amber-500/10 border border-amber-500/15 px-1.5 py-0.5 rounded">${b.id}</span>
                    <span class="text-[9.5px] px-1.5 py-0.5 rounded border ${badgeClass}">${badgeText}</span>
                  </div>
                  <h6 class="font-sans font-black text-xs text-white leading-normal">${b.hotelName}</h6>
                  <p class="text-[9.5px] text-slate-400 font-sans mt-1">${b.roomType}</p>
                  <p class="text-[10px] text-slate-500 font-mono mt-1"><i class="far fa-calendar text-[9px] ml-1"></i>${b.checkIn} لغاية ${b.checkOut} (${b.nightsQuantity} ليالٍ)</p>
                </div>
              </div>

              <div class="flex items-center justify-between md:justify-end gap-4 w-full md:w-auto pt-3 border-t md:border-t-0 border-slate-850">
                <div class="text-right">
                  <span class="text-[9.5px] text-slate-500 block leading-none">القيمة المدفوعة:</span>
                  <span class="font-sans font-black text-sm text-white block mt-1.5 leading-none">$${b.priceTotal}</span>
                </div>
                ${isConfirmed ? `
                  <button class="cancel-btn px-3 py-2 border border-rose-500/20 text-rose-400 bg-rose-500/5 hover:bg-rose-500/15 rounded-lg text-[10px] font-extrabold cursor-pointer transition-all" data-id="${b.id}">إلغاء واسترداد</button>
                ` : `
                  <button disabled class="px-3 py-2 border border-slate-800 text-slate-600 bg-slate-900 rounded-lg text-[10px] font-bold cursor-not-allowed">تم الاسترداد</button>
                `}
              </div>
            </div>
          `;
        }).join('');

        // Attach cancel action listeners
        container.querySelectorAll('.cancel-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const resId = this.getAttribute('data-id');
            const confirmVal = confirm('هل أنت متأكد من رغبتك في إلغاء هذا الحجز الفندقي المعتمد واسترداد القيمة بالكامل؟');
            if (!confirmVal) return;

            const success = window.bookingModule.cancelBooking(resId);
            if (success) {
              alert('تم إلغاء الحجز الفندقي الملكي بنجاح، وتحويل الاسترجاع للبطاقة.');
              renderStandaloneBookings();
            } else {
              alert('عذراً، لم نتمكن من إلغاء الحجز في هذا التوقيت.');
            }
          });
        });
      }
    });
  </script>

</body>
</html>
